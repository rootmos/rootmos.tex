[build]
arch = [ "make", "wget", "patch", "fping", "jq", "perl-list-moreutils", "rsync" ]
debian = [ "make", "wget", "patch", "fping", "jq", "liblist-moreutils-perl", "rsync", "curl" ]
ubuntu = [ "make", "wget", "patch", "bash", "fping", "jq", "liblist-moreutils-perl", "rsync", "curl" ]

[runtime]
arch = [ "make", "git", "libxcrypt-compat" ]
ubuntu = [ "make", "git", "ca-certificates" ]
debian = [ "make", "git", "ca-certificates" ]

[tests]
arch = [ "make" ]
ubuntu = [ "make", "libarchive-tools" ]
debian = [ "make", "libarchive-tools" ]
